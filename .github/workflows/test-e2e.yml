name: E2E Tests

on:
  pull_request:
  workflow_dispatch:

env:
  IMG: localhost/nvidia-carbide-operator:e2e
  DOCKERFILE: Dockerfile.ci
  CERT_MANAGER_INSTALL_SKIP: "false"
  SPIRE_INSTALL_SKIP: "false"
  E2E_IMAGES_SKIP: "false"

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CORE_REPO_PATH: /tmp/carbide/bare-metal-manager-core
      REST_REPO_PATH: /tmp/carbide/bare-metal-manager-rest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Clone Carbide source repos
        run: |
          git clone --depth 1 https://github.com/NVIDIA/bare-metal-manager-core.git /tmp/carbide/bare-metal-manager-core
          git clone --depth 1 https://github.com/NVIDIA/bare-metal-manager-rest.git /tmp/carbide/bare-metal-manager-rest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Increase inotify limits for Carbide stack
        run: |
          sudo sysctl -w fs.inotify.max_user_instances=512
          sudo sysctl -w fs.inotify.max_user_watches=1048576

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Build Carbide service images
        if: env.E2E_IMAGES_SKIP != 'true'
        run: |
          make docker-build-e2e-services E2E_REGISTRY=localhost E2E_IMAGE_TAG=e2e

      - name: Create Kind cluster and pre-load images
        run: |
          make setup-test-e2e
          docker pull quay.io/keycloak/keycloak:latest
          docker pull docker.io/library/postgres:16-alpine
          kind load docker-image quay.io/keycloak/keycloak:latest --name carbide-operator-test-e2e
          kind load docker-image docker.io/library/postgres:16-alpine --name carbide-operator-test-e2e

      - name: Run E2E tests
        run: |
          go mod tidy
          E2E_IMAGES_SKIP=true make test-e2e

      - name: Cleanup
        if: always()
        run: |
          make cleanup-test-e2e || true
