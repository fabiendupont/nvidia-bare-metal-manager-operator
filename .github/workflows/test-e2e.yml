name: E2E Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Build operator image
        run: |
          make docker-build IMG=localhost/nvidia-carbide-operator:e2e \
            DOCKERFILE=Dockerfile.ci

      - name: Create Kind cluster and load image
        run: |
          kind create cluster --name carbide-operator-test-e2e
          kind load docker-image localhost/nvidia-carbide-operator:e2e \
            --name carbide-operator-test-e2e

      - name: Run E2E tests
        run: |
          KIND_CLUSTER=carbide-operator-test-e2e \
          IMG=localhost/nvidia-carbide-operator:e2e \
            go test -tags=e2e ./test/e2e/ -v -ginkgo.v -timeout 10m

      - name: Cleanup
        if: always()
        run: kind delete cluster --name carbide-operator-test-e2e
