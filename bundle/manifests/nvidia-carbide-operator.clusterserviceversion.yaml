  description: |
    The NVIDIA Bare Metal Manager (BMM) Operator automates the deployment and
    lifecycle management of bare metal provisioning infrastructure on OpenShift
    and Kubernetes.

    ## Deployment Profiles

    The operator supports three deployment profiles:

    * **management** -- Deploys management-plane components (Temporal, Keycloak, REST API, site-manager)
    * **site** -- Deploys site-level components (Carbide API, DHCP, PXE, DNS, Vault, RLA, PSM)
    * **management-with-site** -- Deploys all components for a single-cluster topology

    ## Component Tiers

    Components are organized into tiers deployed in dependency order:

    1. **Infrastructure** -- PostgreSQL (per-service user model via Crunchy PGO)
    2. **Core** -- Carbide API, DHCP, PXE, DNS, Vault, RLA, PSM
    3. **REST** -- Temporal (via Helm), Keycloak (managed/external/disabled), REST API, workers, site-manager

    ## TLS Backends

    Two mTLS backends are supported:

    * **SPIFFE/SPIRE** (default) -- Uses SPIRE CSI driver and spiffe-helper sidecars
    * **cert-manager** -- Uses cert-manager Certificates and Issuer/ClusterIssuer

    ## Managed Dependencies

    Each dependency can be operator-managed or point to an external instance,
    allowing flexible integration with existing infrastructure.
