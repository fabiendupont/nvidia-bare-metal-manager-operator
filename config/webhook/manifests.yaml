---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-carbide-nvidia-com-v1alpha1-carbidedeployment
  failurePolicy: Fail
  name: mcarbidedeployment.kb.io
  rules:
  - apiGroups:
    - carbide.nvidia.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - carbidedeployments
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-carbide-nvidia-com-v1alpha1-carbidedeployment
  failurePolicy: Fail
  name: vcarbidedeployment.kb.io
  rules:
  - apiGroups:
    - carbide.nvidia.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - carbidedeployments
  sideEffects: None
