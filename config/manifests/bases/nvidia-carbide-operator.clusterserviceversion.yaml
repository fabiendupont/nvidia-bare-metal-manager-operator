apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "carbide.nvidia.com/v1alpha1",
          "kind": "CarbideDeployment",
          "metadata": {
            "name": "carbide-minimal",
            "namespace": "default"
          },
          "spec": {
            "version": "latest",
            "network": {
              "interface": "enp2s0",
              "ip": "192.168.33.10",
              "gateway": "192.168.33.1",
              "domain": "carbide.local",
              "adminNetworkCIDR": "192.168.33.0/24"
            },
            "infrastructure": {
              "postgresql": {
                "mode": "managed",
                "version": "16",
                "storage": {
                  "size": "10Gi"
                }
              }
            },
            "core": {
              "api": {
                "organizationName": "test-org",
                "providerName": "local-dev-provider",
                "siteName": "local-dev-site"
              },
              "dhcp": {
                "enabled": true
              },
              "pxe": {
                "enabled": true,
                "storage": {
                  "size": "50Gi"
                }
              },
              "dns": {
                "enabled": true
              }
            }
          }
        }
      ]
    capabilities: Full Lifecycle
    categories: Integration & Delivery
    containerImage: ghcr.io/fabiendupont/nvidia-bare-metal-manager-operator:v0.1.0
    description: Automates deployment and lifecycle management of NVIDIA Bare Metal
      Manager infrastructure on Kubernetes clusters.
    repository: https://github.com/NVIDIA/bare-metal-manager-operator
  name: carbide-operator.v0.1.0
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: CarbideDeployment is the Schema for the carbidedeployments API
      displayName: Carbide Deployment
      kind: CarbideDeployment
      name: carbidedeployments.carbide.nvidia.com
      resources:
      - kind: ConfigMap
        name: ""
        version: v1
      - kind: Deployment
        name: ""
        version: apps/v1
      - kind: Job
        name: ""
        version: batch/v1
      - kind: PersistentVolumeClaim
        name: ""
        version: v1
      - kind: Secret
        name: ""
        version: v1
      - kind: Service
        name: ""
        version: v1
      version: v1alpha1
  description: |
    The NVIDIA Bare Metal Manager (BMM) Operator automates the deployment and
    lifecycle management of bare metal provisioning infrastructure on Kubernetes.

    ## Deployment Profiles

    The operator supports three deployment profiles:

    * **management** — Deploys management-plane components (Temporal, Keycloak, REST API)
    * **site** — Deploys site-level components (Carbide API, DHCP, PXE, DNS)
    * **management-with-site** — Deploys all components for a single-cluster topology

    ## Infrastructure Tiers

    Components are organized into tiers that are deployed in order:

    1. **Infrastructure** — PostgreSQL, SPIRE
    2. **Identity** — Keycloak, realm configuration
    3. **Orchestration** — Temporal workflow engine
    4. **Core** — BMM REST API, DHCP, PXE, DNS services

    ## Managed Dependencies

    Each dependency can be operator-managed or point to an external instance,
    allowing flexible integration with existing infrastructure.
  displayName: NVIDIA Bare Metal Manager Operator
  icon:
  - base64data: 
    mediatype: image/svg+xml
  install:
    spec:
      deployments: null
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - bare-metal
  - provisioning
  - nvidia
  - pxe
  - dhcp
  - dns
  - ipam
  links:
  - name: Documentation
    url: https://github.com/NVIDIA/bare-metal-manager-operator/blob/main/docs/
  - name: Source Code
    url: https://github.com/NVIDIA/bare-metal-manager-operator
  maintainers:
  - email: fdupont@nvidia.com
    name: Fabien Dupont
  maturity: alpha
  minKubeVersion: 1.28.0
  provider:
    name: NVIDIA
  relatedImages:
  - image: ghcr.io/fabiendupont/nvidia-bare-metal-manager-operator:v0.1.0
    name: manager
  version: 0.1.0
