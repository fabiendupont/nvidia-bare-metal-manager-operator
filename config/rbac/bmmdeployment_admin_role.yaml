# This rule is not used by the project carbide-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over carbide.nvidia.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: carbide-operator
    app.kubernetes.io/managed-by: kustomize
  name: carbidedeployment-admin-role
rules:
- apiGroups:
  - carbide.nvidia.com
  resources:
  - carbidedeployments
  verbs:
  - '*'
- apiGroups:
  - carbide.nvidia.com
  resources:
  - carbidedeployments/status
  verbs:
  - get
