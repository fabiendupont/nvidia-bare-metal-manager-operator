# This rule is not used by the project carbide-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the carbide.nvidia.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: carbide-operator
    app.kubernetes.io/managed-by: kustomize
  name: carbidedeployment-editor-role
rules:
- apiGroups:
  - carbide.nvidia.com
  resources:
  - carbidedeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - carbide.nvidia.com
  resources:
  - carbidedeployments/status
  verbs:
  - get
